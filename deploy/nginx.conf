# Конфиг nginx как обратный прокси перед Node-приложением.
# Положить в /etc/nginx/sites-available/contract-generator и включить симлинком.
#
# Приложение запускается на ПОДДОМЕНЕ, т.к. основной домен занят вашим сайтом.
# ЗАМЕНИТЕ docs.your-domain.kz на выбранный поддомен (docs / generator / dogovor …).
#
# После первого запуска на 80 порту запустите certbot — он сам допишет блок 443/SSL:
#   sudo certbot --nginx -d docs.your-domain.kz

server {
    listen 80;
    listen [::]:80;
    server_name docs.your-domain.kz;

    # Лимит размера тела запроса (форма небольшая, 2 МБ с запасом)
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
